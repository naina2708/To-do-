<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
</head>
<body>
    <h2>Add To-Do Item</h2>

    <form id="todoForm">
        <input type="text" id="itemName" placeholder="Item Name" required><br><br>
        <textarea id="itemDescription" placeholder="Item Description" required></textarea><br><br>
        <button type="submit">Submit</button>
    </form>

    <script>
        document.getElementById("todoForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const itemName = document.getElementById("itemName").value;
            const itemDescription = document.getElementById("itemDescription").value;

            await fetch("http://localhost:5000/submittodoitem", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ itemName, itemDescription })
            });

            alert("Item submitted!");
        });
    </script>
</body>
</html>
